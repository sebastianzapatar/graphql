# Configuracion de Nginx para SPA (Single Page Application)
# Redirige todas las rutas a index.html para que React Router funcione
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas van a index.html (necesario para SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estaticos (JS, CSS, imagenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
